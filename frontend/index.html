<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:transparent;font-family:sans-serif;width:100%;overflow-x:hidden;}
  
  #wrap{
    background:rgba(20,10,5,0.88);
    border-radius:10px;
    padding:12px;
    color:#f0e0c8;
    width:100%;
    max-width:100%;
    margin:0 auto;
  }

  #preview{
    width:100%;
    height:300px;
    border-radius:6px;
    background:#111;
    display:block;
    object-fit:cover;
  }
  #playback{
    width:100%;
    height:300px;
    border-radius:6px;
    margin-top:6px;
    display:block;
    object-fit:contain;
    background:#000;
  }

  .row{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;}
  select{padding:5px 8px;border-radius:6px;border:1px solid #c4884a;
         background:rgba(30,15,5,0.9);color:#f0e0c8;font-size:12px;flex:1;min-width:0;}
  button{padding:8px 16px;border-radius:6px;border:1px solid #c4884a;
         background:rgba(139,92,42,0.85);color:#fff5e0;cursor:pointer;
         font-size:14px;font-weight:600;white-space:nowrap;}
  button:disabled{opacity:0.35;cursor:not-allowed;}
  button:hover:not(:disabled){background:rgba(180,120,60,0.95);}
  #initBtn{width:100%;padding:14px;font-size:15px;}
  #stopBtn{border-color:#e05050;background:rgba(140,35,35,0.9);}
  #stopBtn:hover:not(:disabled){background:rgba(190,55,55,0.95);}
  #newBtn{border-color:#6aaa6a;background:rgba(40,100,60,0.85);color:#d4f0d4;}
  #dlBtn{display:inline-block;padding:8px 16px;border-radius:6px;
         border:1px solid #6aaa6a;background:rgba(40,100,60,0.85);
         color:#d4f0d4;text-decoration:none;font-size:14px;font-weight:600;}

  #timerBox{display:flex;align-items:center;gap:8px;}
  #recDot{width:12px;height:12px;border-radius:50%;background:#ff3333;
          display:none;animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
  #timer{color:#ff7070;font-weight:700;font-size:18px;min-width:56px;font-variant-numeric:tabular-nums;}

  label{font-size:11px;color:#888;display:block;margin-bottom:2px;}
  .status{color:#888;font-size:12px;margin-top:6px;}
  #resultBox,#recordPhase{display:none;}
  #initPhase{text-align:center;padding:30px 0;}

  /* Post-processing panel */
  #ppBox{display:none;margin-top:14px;background:rgba(0,0,0,0.45);border-radius:8px;padding:12px;}
  .pp-step{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(196,136,74,0.2);}
  .pp-step:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .pp-h{color:#f0e0c8;font-size:14px;font-weight:700;margin-bottom:8px;}
  #ppDlBtn{display:none;padding:8px 16px;border-radius:6px;border:1px solid #6aaa6a;
           background:rgba(40,100,60,0.85);color:#d4f0d4;text-decoration:none;
           font-size:14px;font-weight:600;}
  input[type=color]{width:36px;height:28px;border:1px solid #c4884a;border-radius:4px;
                    background:none;cursor:pointer;padding:2px;}
  input[type=range]{accent-color:#1db954;}
  input.pp-name{flex:1;min-width:0;padding:6px 10px;border-radius:6px;
                border:1px solid #c4884a;background:rgba(30,15,5,0.9);
                color:#f0e0c8;font-size:13px;}
</style>
</head>
<body>

<div id="wrap">

  <!-- Phase 1: permission -->
  <div id="initPhase">
    <button id="initBtn">📷 Włącz kamerę i mikrofon</button>
    <div class="status" id="status" style="margin-top:10px;">
      Kliknij aby przyznać dostęp do kamery i mikrofonu.
    </div>
  </div>

  <!-- Phase 2: recording -->
  <div id="recordPhase">
    <video id="preview" autoplay muted playsinline></video>

    <canvas id="vu" height="80"
      style="width:100%;display:block;border-radius:6px;margin-top:5px;background:#0e1117;">
    </canvas>

    <div id="micWarn" style="display:none;margin-top:6px;padding:8px 12px;
         border-radius:6px;background:rgba(180,40,40,0.85);color:#fff;
         font-size:13px;font-weight:600;align-items:center;gap:10px;">
      ⚠️ Mikrofon rozłączył się!
      <button id="restartMicBtn"
        style="padding:4px 12px;border-radius:5px;border:1px solid #fff;
               background:rgba(255,255,255,0.2);color:#fff;cursor:pointer;
               font-size:12px;font-weight:600;">
        🔄 Wznów mikrofon
      </button>
    </div>

    <div class="row">
      <div style="flex:1;min-width:140px;">
        <label>🎤 Mikrofon</label>
        <select id="micSel"></select>
      </div>
      <div style="flex:1;min-width:120px;">
        <label>📹 Kamera</label>
        <select id="camSel"></select>
      </div>
    </div>

    <div class="row">
      <button id="startBtn">🔴 Nagraj</button>
      <button id="stopBtn" disabled>⏹ Stop</button>
      <div id="timerBox">
        <div id="recDot"></div>
        <span id="timer">00:00</span>
      </div>
    </div>
    <div class="status" id="status2">Kamera gotowa — kliknij Nagraj.</div>
  </div>

  <!-- Phase 3: playback + download -->
  <div id="resultBox">
    <video id="playback" controls playsinline></video>
    <div class="row" style="margin-top:8px;">
      <div style="flex:1;min-width:180px;">
        <label>💾 Nazwa pliku</label>
        <input id="fname" type="text" value="nagranie_av"
          style="width:100%;padding:6px 10px;border-radius:6px;border:1px solid #c4884a;
                 background:rgba(30,15,5,0.9);color:#f0e0c8;font-size:13px;">
      </div>
      <a id="dlBtn" style="align-self:flex-end;">💾 Pobierz</a>
      <button id="newBtn" style="align-self:flex-end;">🔄 Nowe nagranie</button>
    </div>
    <div class="status" id="status3"></div>
  </div>

  <!-- Phase 4: Post-processing (browser-side, FFmpeg.wasm) -->
  <div id="ppBox">

    <div class="pp-step">
      <div class="pp-h">🖼️ Krok 1 — Zamiana tła</div>
      <div class="row">
        <label style="margin:0;font-size:12px;white-space:nowrap;">Metoda:</label>
        <select id="ppMethod" style="width:auto;flex:none;">
          <option value="chromakey">🎨 Chromakey (jednolite tło)</option>
          <option value="overlay">📽️ Tylko nałóż tło (bez usuwania)</option>
        </select>
      </div>
      <div class="row" id="ppColorRow">
        <label style="margin:0;font-size:12px;white-space:nowrap;">Kolor do usunięcia:</label>
        <input type="color" id="ppKeyColor" value="#00b140">
        <label style="margin:0;font-size:12px;white-space:nowrap;">Tolerancja:</label>
        <input type="range" id="ppSim" min="0.05" max="0.6" step="0.01" value="0.25" style="flex:1;min-width:60px;">
        <span id="ppSimVal" style="font-size:12px;min-width:32px;">0.25</span>
      </div>
      <div style="margin-top:8px;">
        <label>Plik tła (MP4):</label>
        <input type="file" id="ppBgFile" accept="video/mp4,video/webm">
      </div>
      <div class="row" style="margin-top:8px;">
        <button id="ppBgBtn">🔄 Zamień tło</button>
      </div>
      <div class="status" id="ppBgSt"></div>
    </div>

    <div class="pp-step" id="ppTitleStep" style="display:none;">
      <div class="pp-h">🎞️ Krok 2 — Strona tytułowa (30 s)</div>
      <div style="margin-top:4px;">
        <label>Plik tytułowy (PNG / JPG / MP4):</label>
        <input type="file" id="ppTitleFile" accept="image/png,image/jpeg,image/jpg,video/mp4">
      </div>
      <div class="row" style="margin-top:8px;">
        <button id="ppTitleBtn">➕ Dodaj stronę tytułową</button>
      </div>
      <div class="status" id="ppTitleSt"></div>
    </div>

    <div class="pp-step" id="ppSaveStep" style="display:none;">
      <div class="pp-h">💾 Krok 3 — Zapisz plik</div>
      <div class="row">
        <input type="text" id="ppName" class="pp-name" value="podcast_final">
        <a id="ppDlBtn">⬇️ Pobierz MP4</a>
      </div>
    </div>

  </div>

</div>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const pad=n=>String(n).padStart(2,'0');
  let stream, recorder, chunks=[], timerIv, t0;
  let ppRecorded=null, ppBgDone=null, ppFinal=null, ffInst=null;

  // Streamlit Component API
  function toStreamlit(type, payload) {
    window.parent.postMessage(
      Object.assign({isStreamlitMessage: true, type: type}, payload || {}), "*"
    );
  }
  toStreamlit("streamlit:componentReady", {apiVersion: 1});
  toStreamlit("streamlit:setFrameHeight", {height: 720});

  // Best supported mime type
  const MIME = ['video/mp4;codecs=avc1,mp4a.40.2', 'video/mp4',
                'video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm']
    .find(t=>MediaRecorder.isTypeSupported(t)) || '';
  const EXT  = MIME.includes('mp4') ? 'mp4' : 'webm';

  // Populate devices
  async function enumDevices(){
    const devs = await navigator.mediaDevices.enumerateDevices();
    const mics = devs.filter(d=>d.kind==='audioinput');
    const cams = devs.filter(d=>d.kind==='videoinput');
    const ms=$('micSel'), cs=$('camSel');
    ms.innerHTML=''; cs.innerHTML='';
    mics.forEach((d,i)=>{ 
      const o=document.createElement('option');
      o.value=d.deviceId; o.textContent=d.label||('Mikrofon '+(i+1));
      ms.appendChild(o);
    });
    cams.forEach((d,i)=>{ 
      const o=document.createElement('option');
      o.value=d.deviceId; o.textContent=d.label||('Kamera '+(i+1));
      cs.appendChild(o);
    });
  }

  // VU Meter — rolling waveform, ten sam styl co audio player
  let vuRaf, vuActx;
  async function startVU(audioStream){
    if(vuRaf) cancelAnimationFrame(vuRaf);
    if(vuActx){ try{ await vuActx.close(); }catch(e){} }
    const actx = new (window.AudioContext||window.webkitAudioContext)();
    vuActx = actx;
    await actx.resume();
    const src = actx.createMediaStreamSource(audioStream);
    const analyser = actx.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.6;
    src.connect(analyser);
    // Keep AudioContext alive — Chrome suspends it without a destination node
    const silence = actx.createGain();
    silence.gain.value = 0;
    analyser.connect(silence);
    silence.connect(actx.destination);
    const td = new Uint8Array(analyser.fftSize);

    const canvas = $('vu');
    const c = canvas.getContext('2d');
    const N_BARS = 200;
    const rolling = new Float32Array(N_BARS); // 0..1 amplitude history

    let frameCount = 0;
    function draw(){
      vuRaf = requestAnimationFrame(draw);
      frameCount++;

      // Sample peak amplitude every 2 frames → smooth scroll
      if(frameCount % 2 === 0){
        analyser.getByteTimeDomainData(td);
        let peak = 0;
        for(let i = 0; i < td.length; i++){
          const v = Math.abs(td[i] - 128) / 128;
          if(v > peak) peak = v;
        }
        // shift left, push new sample
        rolling.copyWithin(0, 1);
        rolling[N_BARS - 1] = peak;
      }

      // Canvas resize only when needed
      const W = canvas.offsetWidth || canvas.parentElement?.offsetWidth || 640;
      if(canvas.width !== W) canvas.width = W;
      const H = canvas.height;

      // Background — identical to audio player
      c.fillStyle = '#0e1117';
      c.fillRect(0, 0, W, H);

      // Bars — identical style to audio player
      const barW = W / N_BARS;
      for(let i = 0; i < N_BARS; i++){
        const amp = rolling[i];
        const h = Math.max(2, amp * H * 0.88);
        const x = i * barW;
        c.fillStyle = '#1db954';
        c.fillRect(x + 0.3, (H - h)/2, Math.max(0.8, barW - 0.6), h);
      }
    }
    draw();
  }

  // Start stream (audio + video)
  async function startStream(){
    if(stream) stream.getTracks().forEach(t=>t.stop());
    const micId = $('micSel').value;
    const camId = $('camSel').value;

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        deviceId: camId ? {exact: camId} : undefined,
        width: {ideal: 1280},
        height: {ideal: 720},
        frameRate: {ideal: 30}
      },
      audio: {
        deviceId: micId ? {exact: micId} : undefined,
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      }
    });

    $('preview').srcObject = stream;
    await $('preview').play().catch(()=>{});
    await startVU(stream);

    const vt = stream.getVideoTracks()[0];
    if(vt){
      const s = vt.getSettings();
      $('status2').textContent = `Kamera: ${s.width}×${s.height} @${Math.round(s.frameRate||30)}fps`;
    }
  }

  // Init
  $('initBtn').onclick = async function(){
    try{
      const tmp = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
      tmp.getTracks().forEach(t=>t.stop());
      await enumDevices();
      $('initPhase').style.display='none';
      $('recordPhase').style.display='block';
      await startStream();
    }catch(e){
      $('status').textContent = '⚠ ' + e.message;
    }
  };

  $('micSel').onchange = startStream;
  $('camSel').onchange = startStream;

  // Start recording
  $('startBtn').onclick = function(){
    chunks = [];
    try{
      const opts = MIME ? {mimeType: MIME, videoBitsPerSecond: 8000000, audioBitsPerSecond: 256000} : {};
      recorder = new MediaRecorder(stream, opts);
    }catch(e){
      recorder = new MediaRecorder(stream);
    }

    recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };

    recorder.onstop = () => {
      clearInterval(timerIv);
      $('recDot').style.display = 'none';

      const blob = new Blob(chunks, {type: recorder.mimeType || 'video/webm'});
      const url = URL.createObjectURL(blob);
      $('playback').src = url;
      $('dlBtn').href = url;

      const name = ($('fname').value.trim() || 'nagranie_av').replace(/\.[^.]+$/, '');
      $('dlBtn').download = name + '.' + EXT;
      $('dlBtn').textContent = '💾 Pobierz ' + name + '.' + EXT;

      const mb = (blob.size / 1048576).toFixed(1);
      $('status3').textContent = `Rozmiar: ${mb} MB | Format: ${EXT.toUpperCase()}`;

      $('recordPhase').style.display = 'none';
      $('resultBox').style.display = 'block';

      // Store blob for browser-side post-processing
      ppRecorded = blob;
      ppBgDone = null; ppFinal = null;
      $('ppTitleStep').style.display = 'none';
      $('ppSaveStep').style.display = 'none';
      $('ppBgSt').textContent = '';
      $('ppTitleSt').textContent = '';
      $('ppDlBtn').style.display = 'none';
      $('ppBox').style.display = 'block';
      toStreamlit("streamlit:setFrameHeight", {height: document.body.scrollHeight + 40});

      // Notify Streamlit (metadata only)
      toStreamlit("streamlit:setComponentValue", {
        value: {done: true, mime: recorder.mimeType || EXT, size: blob.size},
        dataType: "json"
      });
    };

    recorder.start(1000);
    t0 = Date.now();
    timerIv = setInterval(() => {
      const s = Math.floor((Date.now()-t0)/1000);
      $('timer').textContent = pad(Math.floor(s/60)) + ':' + pad(s%60);
    }, 500);

    $('startBtn').disabled = true;
    $('stopBtn').disabled = false;
    $('recDot').style.display = 'inline-block';
    $('status2').textContent = '🔴 Nagrywa…';
  };

  $('stopBtn').onclick = () => recorder.stop();

  $('newBtn').onclick = async () => {
    $('resultBox').style.display = 'none';
    $('ppBox').style.display = 'none';
    $('recordPhase').style.display = 'block';
    $('startBtn').disabled = false;
    $('timer').textContent = '00:00';
    ppRecorded = null; ppBgDone = null; ppFinal = null;
    await startStream();
    toStreamlit("streamlit:setFrameHeight", {height: document.body.scrollHeight + 40});
  };

  // Restart mic
  $('restartMicBtn').onclick = async () => {};

  // ── Post-processing (FFmpeg.wasm, browser-side) ───────────────────────────
  $('ppSim').oninput = () => { $('ppSimVal').textContent = parseFloat($('ppSim').value).toFixed(2); };
  $('ppMethod').onchange = () => {
    $('ppColorRow').style.display = $('ppMethod').value === 'chromakey' ? 'flex' : 'none';
  };

  async function getFF(statusEl) {
    if (ffInst && ffInst.isLoaded()) return ffInst;
    if (!window.FFmpeg) {
      statusEl.textContent = 'Ładuję FFmpeg.wasm (~30 MB, tylko raz)…';
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    statusEl.textContent = 'Inicjalizuję FFmpeg.wasm…';
    const {createFFmpeg} = FFmpeg;
    ffInst = createFFmpeg({
      log: false,
      corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
    });
    await ffInst.load();
    return ffInst;
  }

  $('ppBgBtn').onclick = async function() {
    if (!ppRecorded) { $('ppBgSt').textContent = '⚠️ Brak nagrania.'; return; }
    const bgFile = $('ppBgFile').files[0];
    if (!bgFile) { $('ppBgSt').textContent = '⚠️ Wybierz plik tła.'; return; }
    this.disabled = true;
    try {
      const ff = await getFF($('ppBgSt'));
      const {fetchFile} = FFmpeg;
      $('ppBgSt').textContent = 'Przetwarzam tło…';
      const inExt = MIME.includes('mp4') ? 'mp4' : 'webm';
      ff.FS('writeFile', 'inp.' + inExt, await fetchFile(ppRecorded));
      ff.FS('writeFile', 'bg.mp4',       await fetchFile(bgFile));

      let fc;
      if ($('ppMethod').value === 'chromakey') {
        const col = '0x' + $('ppKeyColor').value.replace('#','');
        const sim = parseFloat($('ppSim').value).toFixed(2);
        fc = `[0:v]chromakey=${col}:${sim}:0.05[fg];[1:v]scale=iw:ih[bg];[bg][fg]overlay[out]`;
      } else {
        fc = '[1:v]scale=iw:ih[bg];[bg][0:v]overlay[out]';
      }
      await ff.run('-i','inp.'+inExt,'-i','bg.mp4',
        '-filter_complex',fc,'-map','[out]','-map','0:a?',
        '-c:v','libx264','-crf','23','-preset','ultrafast',
        '-c:a','aac','-shortest','bgout.mp4');

      const d = ff.FS('readFile','bgout.mp4');
      ppBgDone = new Blob([d.buffer], {type:'video/mp4'});
      ['inp.'+inExt,'bg.mp4','bgout.mp4'].forEach(f=>{try{ff.FS('unlink',f);}catch(e){}});

      $('ppBgSt').textContent = '✅ Tło zamienione!';
      $('ppTitleStep').style.display = 'block';
      $('ppSaveStep').style.display = 'block';
      ppRefreshDl();
      toStreamlit("streamlit:setFrameHeight", {height: document.body.scrollHeight + 40});
    } catch(e) { $('ppBgSt').textContent = '❌ ' + e.message; }
    this.disabled = false;
  };

  $('ppTitleBtn').onclick = async function() {
    if (!ppBgDone) { $('ppTitleSt').textContent = '⚠️ Najpierw zamień tło (Krok 1).'; return; }
    const tf = $('ppTitleFile').files[0];
    if (!tf) { $('ppTitleSt').textContent = '⚠️ Wybierz plik tytułowy.'; return; }
    this.disabled = true;
    try {
      const ff = await getFF($('ppTitleSt'));
      const {fetchFile} = FFmpeg;
      $('ppTitleSt').textContent = 'Przetwarzam stronę tytułową…';
      const tExt = tf.name.split('.').pop().toLowerCase();
      const isImg = ['png','jpg','jpeg'].includes(tExt);
      ff.FS('writeFile','main.mp4', await fetchFile(ppBgDone));
      ff.FS('writeFile','tsrc.'+tExt, await fetchFile(tf));

      const titleArgs = isImg
        ? ['-loop','1','-i','tsrc.'+tExt,'-f','lavfi','-i','anullsrc=cl=stereo:r=44100',
           '-t','30','-c:v','libx264','-pix_fmt','yuv420p','-c:a','aac','-shortest','title.mp4']
        : ['-stream_loop','-1','-i','tsrc.'+tExt,'-f','lavfi','-i','anullsrc=cl=stereo:r=44100',
           '-t','30','-c:v','libx264','-pix_fmt','yuv420p','-c:a','aac','-shortest','title.mp4'];
      await ff.run(...titleArgs);

      ff.FS('writeFile','list.txt', new TextEncoder().encode("file 'title.mp4'\nfile 'main.mp4'\n"));
      await ff.run('-f','concat','-safe','0','-i','list.txt',
        '-c:v','libx264','-crf','23','-c:a','aac','final.mp4');

      const d = ff.FS('readFile','final.mp4');
      ppFinal = new Blob([d.buffer], {type:'video/mp4'});
      ['main.mp4','tsrc.'+tExt,'title.mp4','list.txt','final.mp4']
        .forEach(f=>{try{ff.FS('unlink',f);}catch(e){}});

      $('ppTitleSt').textContent = '✅ Strona tytułowa dodana!';
      ppRefreshDl();
    } catch(e) { $('ppTitleSt').textContent = '❌ ' + e.message; }
    this.disabled = false;
  };

  function ppRefreshDl() {
    const blob = ppFinal || ppBgDone;
    if (!blob) return;
    const name = ($('ppName').value.trim() || 'podcast_final');
    const url = URL.createObjectURL(blob);
    const btn = $('ppDlBtn');
    if (btn._url) URL.revokeObjectURL(btn._url);
    btn._url = url; btn.href = url;
    btn.download = name + '.mp4';
    btn.textContent = '⬇️ Pobierz ' + name + '.mp4';
    btn.style.display = 'inline-block';
  }
  $('ppName').oninput = ppRefreshDl;

})();
</script>
</body>
</html>
